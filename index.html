<!-- 1. Import high-energy Google Fonts -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
  /* Basic Reset */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    /* Replace with your specific 'two chefs competing' image URL */
    background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                url('https://example.com');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
  }

  .glass-hero {
    text-align: center;
    /* Modern Glassmorphism Effect */
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px); 
    -webkit-backdrop-filter: blur(12px);
    padding: 3.5rem 5rem;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    max-width: 90%;
  }

  h1 {
    /* Using 'Anton' for a heavy, cinematic competition vibe */
    font-family: 'Anton', sans-serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 0.5rem;
    color: #ff4d4d; /* Sharp accent red for intensity */
    line-height: 1.1;
  }

  .subtitle {
    font-weight: 300;
    font-size: clamp(1rem, 2vw, 1.4rem);
    letter-spacing: 2px;
    text-transform: lowercase;
    opacity: 0.85;
  }
</style>

<!-- Clean, semantic HTML structure -->
<section class="glass-hero">
  <h1>Cooking Becomes Competition</h1>
  <p class="subtitle">Two Chefs. One Victor. No Mercy.</p>
</section>
