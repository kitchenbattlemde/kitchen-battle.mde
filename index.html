<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kitchen Battle | Cook. Compete. Conquer.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    :root{
      --black:#000;
      --white:#fff;
      --orange:#D96A1A;
      --line-light:rgba(255,255,255,0.12);
      --ease:0.35s ease;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:#fff;
      font-family:"Inter",sans-serif;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;

      padding:1.35rem 5.5%;

      display:grid;
      grid-template-columns:220px 1fr 220px;
      align-items:center;

      background:rgba(0,0,0,0.60);
      backdrop-filter:blur(16px);

      border-bottom:1px solid var(--line-light);
    }

    .logo{
      font-family:"Bebas Neue",sans-serif;
      font-size:2.45rem;
      line-height:0.88;
      letter-spacing:2px;
    }

    .logo span{
      display:block;
      color:var(--orange);
    }

    .nav{
      display:flex;
      justify-content:center;
      gap:3rem;
    }

    .nav a{
      font-size:0.82rem;
      font-weight:800;
      letter-spacing:1.4px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.82);
      position:relative;
    }

    .nav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-0.7rem;
      width:0;
      height:2px;
      background:var(--orange);
      transition:var(--ease);
    }

    .nav a:hover::after,
    .nav a.active::after{
      width:100%;
    }

    .header-btn{
      justify-self:end;

      background:rgba(217,106,26,0.92);

      color:#fff;

      padding:1rem 1.45rem;

      font-size:0.78rem;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;

      transition:var(--ease);
    }

    .header-btn:hover{
      transform:translateY(-3px);
    }

    .hero{
      min-height:100vh;

      padding:8rem 5.5% 4rem;

      display:flex;
      align-items:center;

      position:relative;
      overflow:hidden;

      background:
      linear-gradient(
        90deg,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.74) 26%,
        rgba(0,0,0,0.40) 50%,
        rgba(0,0,0,0.72) 100%
      ),

      radial-gradient(
        circle at center,
        rgba(217,106,26,0.08),
        transparent 42%
      ),

      url("hero-kitchen-battle.jpg") center center / cover no-repeat;

    }

    .hero::before{
      content:"";

      position:absolute;
      inset:0;

      background:
      linear-gradient(
        to right,
        rgba(0,0,0,0.35),
        rgba(0,0,0,0.05),
        rgba(0,0,0,0.40)
      );

      mix-blend-mode:multiply;
    }

    .hero::after{
      content:"";

      position:absolute;
      inset:0;

      background:rgba(0,0,0,0.20);

      backdrop-filter:
      blur(1.4px)
      brightness(0.72);

    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:540px;
    }

    .eyebrow{
      color:var(--orange);

      font-size:0.82rem;
      font-weight:900;

      letter-spacing:6px;
      text-transform:uppercase;

      margin-bottom:1.5rem;
    }

    .hero h1{
      font-family:"Bebas Neue",sans-serif;

      font-size:clamp(5rem,10vw,10rem);

      line-height:0.83;

      text-transform:uppercase;
    }

    .orange{
      color:var(--orange);
    }

    .small-line{
      width:44px;
      height:2px;

      background:var(--orange);

      margin:1.6rem 0 1.4rem;
    }

    .hero-copy{
      font-size:1.18rem;
      line-height:1.65;

      color:#fff;
    }

    .hero-es{
      margin-top:1.55rem;

      color:rgba(255,255,255,0.72);

      font-size:1.08rem;
    }

    .hero-es span{
      color:var(--orange);
    }

    @media(max-width:980px){

      .header{
        grid-template-columns:1fr;
        text-align:center;
        gap:1rem;
      }

      .header-btn{
        display:none;
      }

      .logo{
        justify-self:center;
      }

      .hero{
        padding-top:12rem;
      }

    }

    @media(max-width:560px){

      .hero h1{
        font-size:4.8rem;
      }

      .nav{
        gap:1.5rem;
      }

      .nav a{
        font-size:0.72rem;
      }

    }

  </style>
</head>

<body>

  <header class="header">

    <a href="#home" class="logo">
      KITCHEN
      <span>BATTLE</span>
    </a>

    <nav class="nav">
      <a href="#home" class="active">Home</a>
      <a href="#gallery">Gallery</a>
      <a href="#about">About Us</a>
    </nav>

    <a href="#reserve" class="header-btn">
      Reserve Your Seat
    </a>

  </header>

  <main>

    <section class="hero" id="home">

      <div class="hero-content">

        <p class="eyebrow">
          Live Culinary Battles
        </p>

        <h1>
          Cook.<br>
          Compete.<br>
          <span class="orange">Conquer.</span>
        </h1>

        <div class="small-line"></div>

        <p class="hero-copy">
          Two competitors. Same ingredients.<br>
          You taste. You decide the winner.
        </p>

        <p class="hero-es">
          Cocina. Compite.
          <span>Conquista.</span>
        </p>

      </div>

    </section>

  </main>

</body>
</html>
