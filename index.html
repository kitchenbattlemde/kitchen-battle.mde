<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kitchen Battle | Cook. Compete. Conquer.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --orange: #ff6600;
      --dark-gray: #1a1a1a;
      --soft: rgba(255,255,255,0.7);
      --max-width: 1200px;
      --section-padding: 9rem 6%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: "Montserrat", sans-serif;
      line-height: 1.7;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .section {
      padding: var(--section-padding);
    }

    .eyebrow {
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.75rem;
      margin-bottom: 1rem;
    }

    .headline {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(4rem, 10vw, 8rem);
      line-height: 0.85;
      text-transform: uppercase;
    }

    .headline span {
      color: var(--orange);
    }

    .sub-es {
      margin-top: 1rem;
      color: var(--soft);
      font-weight: 300;
    }

    /* HEADER */
    .header {
      position: fixed;
      width: 100%;
      top: 0;
      padding: 1.5rem 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.9);
    }

    .logo {
      font-family: "Bebas Neue", sans-serif;
      font-size: 2rem;
    }

    .logo span {
      color: var(--orange);
    }

    .nav a {
      margin: 0 1rem;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    .btn {
      border: 1px solid var(--orange);
      padding: 0.7rem 1.4rem;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 2px;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      padding: 10rem 6%;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9));
    }

    .hero h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(4rem, 10vw, 7rem);
      line-height: 0.9;
    }

    /* EXPERIENCE CARDS */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 2rem;
    }

    .card-number {
      color: var(--orange);
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-family: "Bebas Neue", sans-serif;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .card p {
      color: var(--soft);
      font-size: 0.9rem;
    }

    /* CLEAN CONCEPT SECTION */
    .about {
      background: var(--black);
    }

    /* MOBILE */
    @media(max-width:900px){
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <div class="logo">KITCHEN <span>BATTLE</span></div>

  <nav class="nav">
    <a href="#experience">Experience</a>
    <a href="#about">Concept</a>
    <a href="#guest">Guest List</a>
  </nav>

  <a href="#" class="btn">Join</a>
</header>

<section class="hero">
  <div class="container">
    <h1>
      Cook.<br>
      Compete.<br>
      <span>Conquer.</span>
    </h1>
    <p class="sub-es">Cocina. Compite. Conquista.</p>
  </div>
</section>

<section class="section experience" id="experience">
  <div class="container">

    <p class="eyebrow">The Experience</p>

    <div class="cards-grid">

      <div class="card">
        <div class="card-number">01</div>
        <h3>Welcome Drink</h3>
        <p>Cóctel de bienvenida</p>
      </div>

      <div class="card">
        <div class="card-number">02</div>
        <h3>Live Battle</h3>
        <p>Batalla en vivo</p>
      </div>

      <div class="card">
        <div class="card-number">03</div>
        <h3>The Verdict</h3>
        <p>El veredicto final</p>
      </div>

    </div>
  </div>
</section>

<!-- CLEAN CONCEPT SECTION (ONLY LEFT TEXT, NO BOX) -->
<section class="section about" id="about">
  <div class="container">

    <p class="eyebrow">The Concept</p>

    <h2 class="headline">
      Cook.<br>
      Compete.<br>
      <span>Conquer.</span>
    </h2>

    <p class="sub-es">
      Cocina. Compite. Conquista.
    </p>

  </div>
</section>

</body>
</html>
