<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kitchen Battle | Cook. Compete. Conquer.</title>
  <meta name="description" content="Kitchen Battle is a premium live culinary competition experience where guests taste, judge, and decide the winner." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    :root {
      --black: #000000;
      --white: #ffffff;
      --orange: #D96A1A;
      --soft-white: rgba(255, 255, 255, 0.78);
      --muted-white: rgba(255, 255, 255, 0.48);
      --beige: #f2eee9;
      --charcoal: #080808;
      --line-dark: rgba(0, 0, 0, 0.22);
      --line-light: rgba(255, 255, 255, 0.12);
      --ease: 0.35s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 1.35rem 5.5%;
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      align-items: center;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line-light);
    }

    .logo {
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.45rem;
      line-height: 0.88;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--orange);
      display: block;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 3rem;
    }

    .nav a {
      font-size: 0.82rem;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 1.4px;
      color: rgba(255,255,255,0.82);
      position: relative;
      transition: var(--ease);
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -0.7rem;
      width: 0;
      height: 2px;
      background: var(--orange);
      transition: var(--ease);
    }

    .nav a:hover,
    .nav a.active {
      color: var(--white);
    }

    .nav a.active::after,
    .nav a:hover::after {
      width: 100%;
    }

    .header-btn {
      justify-self: end;
      background: var(--orange);
      color: var(--white);
      padding: 1rem 1.45rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 1px;
      transition: var(--ease);
    }

    .header-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 45px rgba(217,106,26,0.25);
    }

    .hero {
      min-height: 100vh;
      padding: 8rem 5.5% 4rem;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(
          90deg,
          rgba(0,0,0,0.82) 0%,
          rgba(0,0,0,0.56) 28%,
          rgba(0,0,0,0.18) 58%,
          rgba(0,0,0,0.52) 100%
        ),
        radial-gradient(circle at 58% 52%, rgba(217,106,26,0.10), transparent 34%),
        url("hero-kitchen-battle.jpg") center center / cover no-repeat,
        #000;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.10);
      backdrop-filter: blur(0.4px);
    }

    .hero-content {
      max-width: 540px;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      color: var(--orange);
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 1.5rem;
    }

    .hero h1,
    .arena-title,
    .section-title,
    .reserve-title {
      font-family: "Bebas Neue", sans-serif;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .hero h1 {
      font-size: clamp(5rem, 10vw, 10rem);
      line-height: 0.83;
      color: var(--white);
    }

    .orange {
      color: var(--orange);
    }

    .small-line {
      width: 44px;
      height: 2px;
      background: var(--orange);
      margin: 1.6rem 0 1.4rem;
    }

    .hero-copy {
      color: var(--white);
      font-size: clamp(1rem, 1.4vw, 1.18rem);
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-es {
      margin-top: 1.55rem;
      color: rgba(255,255,255,0.72);
      font-size: 1.12rem;
      font-weight: 300;
    }

    .hero-es span {
      color: var(--orange);
      font-weight: 500;
    }

    .experience-section {
      display: grid;
      grid-template-columns: 0.95fr 2.05fr;
      min-height: 560px;
      border-top: 1px solid var(--line-light);
      border-bottom: 1px solid var(--line-light);
    }

    .arena-panel {
      background:
        radial-gradient(circle at 15% 78%, rgba(217,106,26,0.08), transparent 28%),
        linear-gradient(180deg, #050505, #000);
      padding: 4.8rem 5.5%;
      display: flex;
      align-items: center;
      position: relative;
    }

    .arena-panel::after {
      content: "";
      position: absolute;
      right: 2rem;
      top: 9%;
      width: 2px;
      height: 82%;
      background: var(--orange);
      opacity: 0.9;
    }

    .arena-title {
      font-size: clamp(3.4rem, 6vw, 6rem);
      line-height: 0.92;
      margin-bottom: 1.6rem;
    }

    .arena-copy {
      max-width: 360px;
      color: rgba(255,255,255,0.84);
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 300;
    }

    .arena-es {
      margin-top: 1.8rem;
      color: rgba(255,255,255,0.62);
      font-size: 1rem;
    }

    .arena-es span {
      color: var(--orange);
      font-weight: 600;
    }

    .info-panel {
      background: var(--beige);
      color: #111;
      padding: 4.8rem 5.5%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .info-inner {
      width: 100%;
      max-width: 920px;
      text-align: center;
    }

    .info-kicker {
      color: var(--orange);
      font-size: clamp(1.35rem, 2.5vw, 2.3rem);
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .section-title {
      color: #111;
      font-size: clamp(3.4rem, 5vw, 6.2rem);
      line-height: 0.95;
      margin-bottom: 0.45rem;
    }

    .section-sub {
      color: rgba(0,0,0,0.52);
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 2.7rem;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .feature {
      padding: 0 2.4rem;
      position: relative;
    }

    .feature:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 8%;
      height: 86%;
      width: 1px;
      background: var(--line-dark);
    }

    .icon {
      width: 88px;
      height: 88px;
      border: 1.4px solid var(--orange);
      border-radius: 50%;
      margin: 0 auto 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 48px;
      height: 48px;
      fill: none;
      stroke: #111;
      stroke-width: 1.45;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feature h3 {
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.35;
      margin-bottom: 1rem;
    }

    .feature p {
      font-size: 0.88rem;
      line-height: 1.65;
      color: #111;
    }

    .feature .divider {
      width: 32px;
      height: 1.5px;
      background: var(--orange);
      margin: 1.25rem auto;
    }

    .feature .es {
      color: rgba(0,0,0,0.46);
      font-size: 0.82rem;
    }

    .reserve {
      min-height: 460px;
      background: var(--black);
      padding: 5.2rem 5.5%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-bottom: 1px solid var(--line-light);
    }

    .reserve-inner {
      max-width: 760px;
    }

    .reserve-title {
      font-size: clamp(3.5rem, 6vw, 6.8rem);
      line-height: 0.9;
      margin-bottom: 1.25rem;
    }

    .reserve-copy {
      color: rgba(255,255,255,0.84);
      font-size: 1.08rem;
      line-height: 1.65;
      max-width: 520px;
      margin: 0 auto;
    }

    .reserve-es {
      color: rgba(255,255,255,0.58);
      font-size: 0.98rem;
      line-height: 1.65;
      max-width: 600px;
      margin: 0.9rem auto 0;
    }

    .reserve-btn {
      display: inline-block;
      margin-top: 2.1rem;
      min-width: 320px;
      background: var(--orange);
      color: var(--white);
      padding: 1.15rem 2rem;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1.3px;
      font-weight: 900;
      transition: var(--ease);
    }

    .reserve-btn span {
      display: block;
      text-transform: none;
      font-size: 0.85rem;
      letter-spacing: 0;
      font-weight: 400;
      margin-top: 0.25rem;
    }

    .reserve-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 55px rgba(217,106,26,0.28);
    }

    .footer {
      background: #050505;
      padding: 1.5rem 5.5%;
      display: grid;
      grid-template-columns: 220px 1fr 160px;
      gap: 2rem;
      align-items: center;
      border-top: 1px solid var(--line-light);
    }

    .footer-logo {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.7rem;
      line-height: 0.88;
      letter-spacing: 1.5px;
    }

    .footer-logo span {
      display: block;
      color: var(--orange);
    }

    .footer-center {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      color: rgba(255,255,255,0.74);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }

    .footer-center .bar {
      width: 1px;
      height: 32px;
      background: var(--orange);
    }

    .footer-center span span {
      color: var(--orange);
    }

    .footer-icons {
      justify-self: end;
      display: flex;
      gap: 1.4rem;
      align-items: center;
    }

    .footer-icons a {
      opacity: 0.86;
      transition: var(--ease);
    }

    .footer-icons a:hover {
      opacity: 1;
      color: var(--orange);
    }

    .footer-icons svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    @media (max-width: 980px) {
      .header {
        grid-template-columns: 1fr;
        gap: 1.2rem;
        text-align: center;
        position: absolute;
      }

      .logo {
        justify-self: center;
      }

      .header-btn {
        display: none;
      }

      .nav {
        gap: 1.6rem;
      }

      .hero {
        padding-top: 12rem;
        min-height: 850px;
      }

      .experience-section {
        grid-template-columns: 1fr;
      }

      .arena-panel::after {
        display: none;
      }

      .features {
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      .feature {
        padding: 0;
      }

      .feature:not(:last-child)::after {
        display: none;
      }

      .footer {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .footer-logo,
      .footer-icons {
        justify-self: center;
      }

      .footer-center {
        flex-direction: column;
        gap: 1rem;
      }

      .footer-center .bar {
        width: 60px;
        height: 1px;
      }
    }

    @media (max-width: 560px) {
      .hero h1 {
        font-size: 4.8rem;
      }

      .nav a {
        font-size: 0.72rem;
      }

      .arena-title,
      .reserve-title {
        font-size: 4rem;
      }

      .section-title {
        font-size: 3.2rem;
      }

      .info-kicker {
        font-size: 1.2rem;
        letter-spacing: 5px;
      }

      .reserve-btn {
        width: 100%;
        min-width: 0;
      }
    }

  </style>
</head>

<body>

  <header class="header">

    <a href="#home" class="logo" aria-label="Kitchen Battle Home">
      KITCHEN
      <span>BATTLE</span>
    </a>

    <nav class="nav" aria-label="Primary navigation">
      <a href="#home" class="active">Home</a>
      <a href="#gallery">Gallery</a>
      <a href="#about">About Us</a>
    </nav>

    <a href="#reserve" class="header-btn">Reserve Your Seat</a>

  </header>

  <main>

    <section class="hero" id="home">

      <div class="hero-content">

        <p class="eyebrow">Live Culinary Battles</p>

        <h1>
          Cook.<br>
          Compete.<br>
          <span class="orange">Conquer.</span>
        </h1>

        <div class="small-line"></div>

        <p class="hero-copy">
          Two competitors. Same ingredients.<br>
          You taste. You decide the winner.
        </p>

        <p class="hero-es">
          Cocina. Compite. <span>Conquista.</span>
        </p>

      </div>

    </section>

  </main>

</body>
</html>
