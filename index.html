<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Kitchen Battle</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .heading {
      font-family: 'Oswald', sans-serif;
    }
  </style>
</head>

<body class="bg-white text-[#111111]">

  <!-- 🔝 HEADER -->
  <header class="flex justify-between items-center px-8 py-5 border-b border-gray-200">

    <h1 class="heading text-xl tracking-wider">
      KITCHEN BATTLE
    </h1>

    <nav class="hidden md:flex gap-8 text-sm text-gray-600">
      <a href="#" class="hover:text-black">Home</a>
      <a href="#">Experience</a>
      <a href="#">About</a>
      <a href="#">Gallery</a>
      <a href="#">Contact</a>
    </nav>

    <button class="border border-[#D96A1A] text-[#D96A1A] px-5 py-2 text-sm hover:bg-[#D96A1A] hover:text-white transition">
      JOIN
    </button>

  </header>


  <!-- 🥇 HERO SECTION -->
  <section class="grid md:grid-cols-2 items-center px-8 py-20 gap-10">

    <!-- LEFT TEXT -->
    <div>
      <h2 class="heading text-5xl md:text-6xl leading-tight">
        TWO COMPETITORS.<br>
        TWO DISHES.<br>
        <span class="text-[#D96A1A]">ONE WINNER.</span>
      </h2>

      <p class="mt-6 text-gray-600 max-w-md">
        A live cooking battle where you taste every round and decide who conquers the kitchen.
      </p>

      <button class="mt-8 bg-[#D96A1A] text-white px-6 py-3 hover:bg-[#F07A2A] transition">
        JOIN THE GUEST LIST
      </button>
    </div>


    <!-- RIGHT IMAGE -->
    <div>
      <img src="your-image.jpg" alt="Food" class="rounded-lg shadow-lg">
    </div>

  </section>

</body>
</html>
